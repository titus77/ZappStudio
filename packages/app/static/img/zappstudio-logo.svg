<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" fill="none">
  <!-- ZappStudio logo: house + lightning bolt icon with text -->
  <defs>
    <linearGradient id="house-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="bolt-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <!-- House outline -->
  <path d="M18 4L3 16V36H13V26H23V36H33V16L18 4Z" fill="none" stroke="url(#house-grad)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Lightning bolt -->
  <path d="M21 12L13 22H18L15 30L24 19H19L21 12Z" fill="url(#bolt-grad)"/>
  <!-- Text: ZappStudio -->
  <text x="42" y="17" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="12" fill="#1E293B">Zapp</text>
  <text x="42" y="32" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-weight="500" font-size="12" fill="#6366F1">Studio</text>
</svg>
